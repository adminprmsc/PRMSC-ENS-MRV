upstream prmsc_backend {
    server backend:5001;
}

upstream prmsc_frontend {
    server frontend:80;
}

# HTTP — use for initial VM setup or behind an external TLS terminator.
server {
    listen 80;
    server_name _;

    # Training video upload allows up to 200 MB (backend multer limit).
    client_max_body_size 210m;

    location /api/ {
        proxy_pass http://prmsc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Large training-video uploads need longer than the default.
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://prmsc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

