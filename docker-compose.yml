services:
  postgres:
    image: postgres:16-alpine
    container_name: prmsc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prmsc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prmsc}
      POSTGRES_DB: ${POSTGRES_DB:-prmsc_mrv}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-prmsc} -d ${POSTGRES_DB:-prmsc_mrv}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prmsc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-5001}:5001'
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://${POSTGRES_USER:-prmsc}:${POSTGRES_PASSWORD:-prmsc}@postgres:5432/${POSTGRES_DB:-prmsc_mrv}?sslmode=disable
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-}
      SUPABASE_S3_ENDPOINT: ${SUPABASE_S3_ENDPOINT:-}
      SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-}
      SUPABASE_S3_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY_ID:-}
      SUPABASE_S3_SECRET_ACCESS_KEY: ${SUPABASE_S3_SECRET_ACCESS_KEY:-}
      SUPABASE_STORAGE_PUBLIC_BASE_URL: ${SUPABASE_STORAGE_PUBLIC_BASE_URL:-}

volumes:
  postgres_data:
